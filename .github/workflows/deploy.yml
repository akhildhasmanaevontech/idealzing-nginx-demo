name: Deploy Nginx Container

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: self-hosted

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4


    - name: Build Docker Image
      run: docker build -t idealzing-nginx .


    - name: Deploy Container
      run: |
        docker stop nginx-demo
        docker rm nginx-demo

        docker run -d --name nginx-demo -p 8080:80 idealzing-nginx